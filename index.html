<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ateliê da Lua — Mimos que encantam ✨</title>
<meta name="description" content="Peças artesanais feitas à mão pelo Ateliê da Lua. Escolha seu mimo e chame no WhatsApp!">
<link rel="icon" type="image/jpg" href="favicon-lua.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="side-deco" id="sideDeco" aria-hidden="true">
  <svg class="side-cat" id="sideCat" viewBox="0 0 60 46" fill="none">
    <path d="M4 44c-5-3-6-11 0-15" stroke="#8a7e8f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8 44c-1-11 7-19 19-19 10 0 17 6 18 14" stroke="#8a7e8f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="42" cy="15" r="9" stroke="#8a7e8f" stroke-width="1.6"/>
    <path d="M36 9l0-6 5 4.5" stroke="#8a7e8f" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M47 8l1-6 5 5" stroke="#8a7e8f" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M39 15.5c.6.6 1 .6 1.6 0M44.4 15.5c.6.6 1 .6 1.6 0" stroke="#8a7e8f" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M42 18.5c.5.7 1.3.7 1.8 0" stroke="#8a7e8f" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M33 22c-4 3-6 8-6 13" stroke="#8a7e8f" stroke-width="1.6" stroke-linecap="round"/>
  </svg>
  <svg class="side-ball" viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="15" fill="var(--croche)"/>
    <path d="M8 14c6 6 6 16 2 22M32 14c-6 6-6 16-2 22M6 20c8 1 16 1 24 1M20 5c-2 8-2 16 0 24" stroke="#a04a76" stroke-width="1" opacity=".55" fill="none"/>
  </svg>
  <svg class="side-thread" viewBox="0 0 40 90" fill="none" preserveAspectRatio="none">
    <path d="M20 0 C9 14 31 24 20 38 C9 52 31 62 20 76 C13 85 24 88 20 90" stroke="var(--croche)" stroke-width="2" stroke-linecap="round"/>
  </svg>
</div>

<div class="mini-header" id="miniHeader">
  <img src="logo.png" alt="Ateliê da Lua" class="mini-brandmark">
  <span>Ateliê da Lua</span>
</div>

<div class="wrap">

  <div class="masthead">
    <img src="logo.png" alt="Ateliê da Lua" class="brandmark">
    <h1>Mimos que encantam ✨</h1>
    <p class="sub">Gostou de alguma coisa? É só chamar no WhatsApp — sem cadastro, simples assim.</p>
    <p class="updated-note" id="statusbar" hidden></p>
  </div>

  <div class="searchrow">
    <input type="text" id="search" placeholder="O que seu coração procura hoje? ♡">
  </div>

  <div class="drawers" id="drawers"></div>

  <div class="bulkrow">
    <h2 id="sectionTitle">Todos os mimos</h2>
  </div>

  <div class="grid" id="grid"></div>

  <footer>Feito com carinho pelo Ateliê da Lua 🌙 · <a href="admin.html">Área do admin</a></footer>
</div>

<div class="lightbox" id="lightbox" hidden>
  <button class="lightbox-close" id="lightboxClose" aria-label="Fechar">&times;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script src="shared.js"></script>
<script>
let produtos = [];
let whatsappNumero = '';
let activeCategory = null; // null = "Todos"
let searchTerm = '';

const drawersEl = document.getElementById('drawers');
const gridEl = document.getElementById('grid');
const sectionTitleEl = document.getElementById('sectionTitle');
const statusbarEl = document.getElementById('statusbar');

const WHATSAPP_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

async function loadData(){
  try{
    const res = await fetch('./data.json?t=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const payload = await res.json();
    produtos = payload.produtos || [];
    whatsappNumero = (payload.config && payload.config.whatsappNumero) || '';
    statusbarEl.hidden = true;
    statusbarEl.classList.remove('error');
    render();
  }catch(e){
    statusbarEl.textContent = 'Não foi possível carregar os produtos. Tente recarregar a página.';
    statusbarEl.classList.add('error');
    statusbarEl.hidden = false;
  }
}

function renderDrawers(){
  const categoriasComItens = CATEGORIES.filter(cat => produtos.some(p => p.categoria === cat));
  if(categoriasComItens.length < 2){ drawersEl.innerHTML = ''; return; }
  const todosHTML = `<div class="drawer ${!activeCategory && !searchTerm ? 'active' : ''}" data-cat="" style="--cat-color:var(--outros);--cat-bg:var(--outros-bg);">
    <span class="icon">✨</span><span class="name">Todos</span><span class="count">${produtos.length}</span>
  </div>`;
  const catsHTML = categoriasComItens.map(cat => {
    const key = CAT_KEY[cat];
    const count = produtos.filter(p => p.categoria === cat).length;
    const active = (!searchTerm && activeCategory === cat) ? 'active' : '';
    return `<div class="drawer ${active}" data-cat="${cat}" style="--cat-color:var(--${key});--cat-bg:var(--${key}-bg);">
      <span class="icon">${ICONS[cat]}</span><span class="name">${cat}</span><span class="count">${count}</span>
    </div>`;
  }).join('');
  drawersEl.innerHTML = todosHTML + catsHTML;
  drawersEl.querySelectorAll('.drawer').forEach(el => {
    el.addEventListener('click', () => {
      activeCategory = el.dataset.cat || null;
      searchTerm = '';
      document.getElementById('search').value = '';
      render();
    });
  });
}

function visibleProdutos(){
  let list = produtos;
  if(searchTerm){
    const t = searchTerm.toLowerCase();
    list = list.filter(p => p.nome.toLowerCase().includes(t));
  } else if(activeCategory){
    list = list.filter(p => p.categoria === activeCategory);
  }
  return list.slice().sort((a,b) => (b.destaque === a.destaque) ? 0 : (b.destaque ? 1 : -1));
}

function renderGrid(){
  const list = visibleProdutos();
  sectionTitleEl.textContent = searchTerm ? `Resultados para "${searchTerm}"` : (activeCategory || 'Todos os mimos');

  if(!list.length){
    gridEl.innerHTML = produtos.length
      ? '<div class="empty"><div class="big">🎨</div>Nenhum mimo encontrado com esse filtro.</div>'
      : '<div class="empty"><div class="big">🌙</div>Em breve novidades por aqui...</div>';
    return;
  }

  gridEl.innerHTML = list.map(p => {
    const thumbHTML = p.imagem
      ? `<img class="thumb thumb-zoomable" src="${p.imagem}" alt="${p.nome}" loading="lazy">`
      : `<div class="thumb-empty">🌙</div>`;
    const precoHTML = p.precoCombinar
      ? '<span class="preco preco-combinar">Valor a combinar</span>'
      : (p.preco ? `<span class="preco">${formatPreco(p.preco)}</span>` : '<span></span>');
    const destaqueHTML = p.destaque ? '<span class="badge-destaque">✨</span>' : '';
    const whatsappHref = whatsappNumero ? linkWhatsappProduto(whatsappNumero, p) : '#';
    const descricaoHTML = p.descricao
      ? `<p class="descricao">${p.descricao}</p>${p.descricao.length > 60 ? '<button class="ver-mais" type="button">ver mais</button>' : ''}`
      : '';
    return `<div class="card">
      ${destaqueHTML}
      ${thumbHTML}
      ${p.categoria ? `<span class="cat-tag">${p.categoria}</span>` : ''}
      <p class="title">${p.nome}</p>
      ${descricaoHTML}
      <div class="card-footer">
        ${precoHTML}
        <a class="whatsapp-pill" href="${whatsappHref}" target="_blank" rel="noopener noreferrer" aria-label="Pedir no WhatsApp">
          ${WHATSAPP_SVG}
        </a>
      </div>
    </div>`;
  }).join('');

  gridEl.querySelectorAll('.thumb-zoomable').forEach(img => {
    img.addEventListener('click', () => openLightbox(img.src, img.alt));
  });

  gridEl.querySelectorAll('.ver-mais').forEach(btn => {
    btn.addEventListener('click', () => {
      const descricao = btn.previousElementSibling;
      const expandido = descricao.classList.toggle('expandido');
      btn.textContent = expandido ? 'ver menos' : 'ver mais';
    });
  });
}

const lightboxEl = document.getElementById('lightbox');
const lightboxImgEl = document.getElementById('lightboxImg');
function openLightbox(src, alt){
  lightboxImgEl.src = src;
  lightboxImgEl.alt = alt || '';
  lightboxEl.hidden = false;
  requestAnimationFrame(() => lightboxEl.classList.add('show'));
}
function closeLightbox(){
  lightboxEl.classList.remove('show');
  setTimeout(() => { lightboxEl.hidden = true; lightboxImgEl.src = ''; }, 200);
}
lightboxEl.addEventListener('click', closeLightbox);
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
window.addEventListener('keydown', (e) => { if(e.key === 'Escape' && !lightboxEl.hidden) closeLightbox(); });

function render(){
  renderDrawers();
  renderGrid();
}

const sideDecoEl = document.getElementById('sideDeco');
const MIMOS = ['🐾','💕','✨','🧶','🌸'];
sideDecoEl.addEventListener('click', (e) => {
  sideDecoEl.classList.remove('animando');
  void sideDecoEl.offsetWidth;
  sideDecoEl.classList.add('animando');

  const emoji = document.createElement('span');
  emoji.className = 'mimo-flutuante';
  emoji.textContent = MIMOS[Math.floor(Math.random() * MIMOS.length)];
  emoji.style.left = (e.clientX - 10) + 'px';
  emoji.style.top = (e.clientY - 10) + 'px';
  document.body.appendChild(emoji);
  setTimeout(() => emoji.remove(), 1200);
});

document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim();
  render();
});

const miniHeaderEl = document.getElementById('miniHeader');
window.addEventListener('scroll', () => {
  miniHeaderEl.classList.toggle('visible', window.scrollY > 220);
}, { passive: true });

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
